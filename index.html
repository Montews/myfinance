<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance - Controle Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

<aside class="w-64 bg-slate-800 text-white hidden md:flex flex-col shadow-xl">
    <div class="p-6 text-2xl font-bold border-b border-slate-700 flex items-center gap-2">
        <i class="fas fa-wallet text-blue-400"></i> MyFinance
    </div>
    <nav class="flex-1 p-4 space-y-2 text-sm">
        <a href="#" class="block p-3 rounded bg-blue-600 font-bold shadow"><i class="fas fa-list-ul mr-2"></i> Transações</a>
    </nav>
</aside>

<main class="flex-1 flex flex-col overflow-y-auto">
    <header class="p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
        <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500 transition-transform hover:scale-[1.02]">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Entradas</p>
            <h2 id="total-entrada" class="text-2xl font-black text-green-600">R$ 0,00</h2>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-500 transition-transform hover:scale-[1.02]">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Saídas</p>
            <h2 id="total-saida" class="text-2xl font-black text-red-600">R$ 0,00</h2>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500 transition-transform hover:scale-[1.02]">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Investimento</p>
            <h2 id="total-investimento" class="text-2xl font-black text-blue-600">R$ 0,00</h2>
        </div>
    </header>

    <section class="px-4 md:px-6 pb-4">
        <div class="bg-white p-4 rounded-lg shadow-sm flex flex-wrap gap-4 items-end border border-gray-200">
            <div class="flex flex-col">
                <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-wider">Buscar por:</label>
                <select id="filtro-tipo" class="border border-gray-300 rounded p-2 text-sm bg-gray-50 outline-none focus:border-blue-500" onchange="ajustarCamposFiltro()">
                    <option value="todos" selected>Por Período</option>
                    <option value="conta">Por Conta</option>
                    <option value="periodo-conta">Período + Conta</option>
                    <option value="categoria">Por Categoria</option>
                    <option value="fatura">Fatura do Cartão</option>
                </select>
            </div>

            <div id="campos-dinamicos" class="flex flex-wrap gap-3">
                <div id="div-inicio" class="flex flex-col"><label class="text-[10px] font-bold uppercase text-gray-400 mb-1">Início</label><input type="date" id="filtro-inicio" class="border border-gray-300 rounded p-2 text-sm bg-gray-50"></div>
                <div id="div-fim" class="flex flex-col"><label class="text-[10px] font-bold uppercase text-gray-400 mb-1">Fim</label><input type="date" id="filtro-fim" class="border border-gray-300 rounded p-2 text-sm bg-gray-50"></div>
                <div id="div-conta" class="hidden flex flex-col"><label class="text-[10px] font-bold uppercase text-gray-400 mb-1">Conta</label><select id="filtro-conta" class="border border-gray-300 rounded p-2 text-sm min-w-[120px] bg-gray-50"></select></div>
                <div id="div-categoria" class="hidden flex flex-col"><label class="text-[10px] font-bold uppercase text-gray-400 mb-1">Categoria</label><select id="filtro-categoria" class="border border-gray-300 rounded p-2 text-sm min-w-[120px] bg-gray-50"></select></div>
                <div id="div-fatura" class="hidden flex flex-col"><label class="text-[10px] font-bold uppercase text-gray-400 mb-1">Mês Fatura</label><input type="text" id="filtro-mes-fatura" class="border border-gray-300 rounded p-2 text-sm w-32 bg-gray-50" placeholder="Marco/26"></div>
            </div>

            <div class="flex gap-2 w-full md:w-auto ml-auto">
                <button onclick="buscarDados()" class="flex-1 md:flex-none bg-blue-600 text-white px-6 py-2 rounded text-sm font-bold shadow-md hover:bg-blue-700 transition-colors h-[38px]">FILTRAR</button>
                <button onclick="abrirModalNovoGasto()" class="flex-1 md:flex-none bg-green-600 text-white px-6 py-2 rounded text-sm font-bold shadow-md hover:bg-green-700 transition-colors h-[38px]"><i class="fas fa-plus mr-1"></i> NOVO</button>
            </div>
        </div>
    </section>

    <div id="status-container" class="hidden px-4 md:px-6 pb-4"><div id="status-message"></div></div>

    <section class="px-4 md:px-6 pb-6 flex-1">
        <div id="tabela-container" class="bg-white rounded-lg shadow-sm overflow-x-auto border border-gray-200 custom-scroll relative">
            <table class="w-full text-left border-collapse min-w-[950px]">
                <thead class="bg-slate-50 border-b">
                <tr>
                    <th class="p-4 w-10"></th>
                    <th class="p-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Data</th>
                    <th class="p-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Valor</th>
                    <th class="p-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Descrição</th>
                    <th class="p-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Conta</th>
                    <th class="p-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Categoria</th>
                    <th class="p-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Fatura</th>
                    <th class="p-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider text-center">Parcela</th>
                </tr>
                </thead>
                <tbody id="tabela-corpo" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="modal-novo" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[95vh] overflow-y-auto animate-fade-in">
        <div class="bg-slate-800 p-4 text-white flex justify-between items-center sticky top-0 z-10 shadow-sm">
            <h3 class="font-bold uppercase text-xs tracking-widest text-blue-300"><i class="fas fa-plus-circle mr-2"></i>Novo Registro</h3>
            <button onclick="fecharModal()" class="text-gray-400 hover:text-white px-2 transition-colors"><i class="fas fa-times text-lg"></i></button>
        </div>

        <form id="form-novo" class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div><label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Data (Vazio=Hoje)</label><input type="date" id="new-data" class="w-full border border-gray-300 p-2.5 rounded text-sm bg-gray-50 outline-none"></div>
                <div><label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Valor</label><input type="number" step="0.01" id="new-valor" class="w-full border border-gray-300 p-2.5 rounded text-sm outline-none" required></div>
                <div><label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Local</label><input type="text" id="new-local" class="w-full border border-gray-300 p-2.5 rounded text-sm outline-none"></div>

                <div class="md:col-span-2"><label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Descrição</label><input type="text" id="new-descricao" class="w-full border border-gray-300 p-2.5 rounded text-sm outline-none" required></div>

                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Tipo</label>
                    <select id="new-tipo" onchange="verificarInvestimento()" class="w-full border border-gray-300 p-2.5 rounded text-sm bg-gray-50 outline-none">
                        <option value="SAIDA">SAÍDA</option>
                        <option value="ENTRADA">ENTRADA</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Forma Pagto</label>
                    <select id="new-forma" onchange="verificarInvestimento()" class="w-full border border-gray-300 p-2.5 rounded text-sm bg-gray-50 outline-none">
                        <option value="DEBITO">DÉBITO</option>
                        <option value="CREDITO">CRÉDITO</option>
                        <option value="INVESTIMENTO">INVESTIMENTO</option>
                    </select>
                </div>

                <div><label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Categoria</label><select id="new-categoria" class="w-full border border-gray-300 p-2.5 rounded text-sm bg-gray-50 outline-none"></select></div>

                <div><label id="label-conta-principal" class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Conta</label><select id="new-conta" class="w-full border border-gray-300 p-2.5 rounded text-sm bg-gray-50 outline-none"></select></div>

                <div id="div-new-conta-auxiliar" class="hidden flex-col">
                    <div class="flex justify-between items-center mb-1">
                        <label id="label-conta-auxiliar" class="block text-[10px] font-bold uppercase text-blue-600">
                            <i class="fas fa-exchange-alt mr-1"></i> Conta Relacionada
                        </label>
                        <label id="label-check-rendimento" class="flex items-center gap-1 text-[10px] font-bold text-green-600 cursor-pointer bg-green-50 px-2 py-1 rounded border border-green-200 hover:bg-green-100 transition-colors">
                            <input type="checkbox" id="check-rendimento" onchange="document.getElementById('new-conta-auxiliar').disabled = this.checked; document.getElementById('new-conta-auxiliar').classList.toggle('opacity-50')">
                            SÓ RENDIMENTO?
                        </label>
                    </div>
                    <select id="new-conta-auxiliar" class="w-full border border-blue-400 p-2.5 rounded text-sm bg-blue-50 outline-none focus:border-blue-500 transition-opacity"></select>
                </div>

                <div><label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Mês Fatura</label><select id="new-mes-fatura" class="w-full border border-gray-300 p-2.5 rounded text-sm bg-gray-50 outline-none transition-colors"></select></div>
                <div><label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Parcela</label><input type="text" id="new-parcela" class="w-full border border-gray-300 p-2.5 rounded text-sm outline-none transition-colors" placeholder="1/1"></div>
            </div>

            <div class="mt-8 pt-6 border-t flex flex-col md:flex-row justify-between items-center gap-4 bg-gray-50 -mx-6 -mb-6 p-6 rounded-b-xl">
                <label class="flex items-center gap-2 text-[11px] font-bold text-gray-500 cursor-pointer hover:text-gray-800 transition-colors">
                    <input type="checkbox" id="criar-varios" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    MANTER ABERTO (CRIAR VÁRIOS)
                </label>
                <div class="flex gap-3 w-full md:w-auto">
                    <button type="button" onclick="fecharModal()" class="flex-1 md:flex-none px-6 py-2.5 text-sm font-bold text-gray-500 hover:text-gray-800 transition-colors">CANCELAR</button>
                    <button type="button" onclick="salvarNovoGasto(this)" class="flex-1 md:flex-none px-8 py-2.5 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-lg shadow-lg uppercase transition-all transform hover:scale-105">Salvar Registro</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div id="toast-container" style="z-index: 999999 !important;" class="fixed top-5 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 pointer-events-none"></div>

<script src="script.js"></script>
</body>
</html>
