<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyFinance - Transações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .font-black { font-weight: 900; }

        #header-mobile { z-index: 1001 !important; }
        #sidebar-lateral { z-index: 1000 !important; }
        #sidebar-overlay { z-index: 999 !important; }
        .modal-z { z-index: 1300 !important; }

        .shadow-suave { box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.04), 0 2px 6px -2px rgba(0, 0, 0, 0.02); }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        body, html { height: 100%; margin: 0; overflow: hidden; background-color: #f3f4f6; }

        .loading-overlay { opacity: 0.5; pointer-events: none; filter: blur(2px); transition: all 0.3s; }

        .input-padrao { border: 1px solid #e2e8f0; border-radius: 0.5rem; outline: none; transition: all 0.2s; background-color: #f8fafc; }
        .input-padrao:focus { border-color: #3b82f6; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-gray-100 font-sans flex h-screen text-slate-900">

<div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-slate-900/80 lg:hidden transition-opacity"></div>

<aside id="sidebar-lateral" class="fixed inset-y-0 left-0 w-64 bg-slate-800 text-white transform -translate-x-full lg:translate-x-0 lg:static lg:flex flex-col shadow-2xl shrink-0 transition-transform duration-300 ease-in-out">
    <div class="hidden lg:flex p-6 text-2xl font-bold border-b border-slate-700 items-center gap-2 text-blue-400">
        <i class="fas fa-wallet"></i> <span class="text-white">MyFinance</span>
    </div>

    <nav class="flex-1 p-4 mt-20 lg:mt-0 space-y-2 text-sm font-black uppercase">
        <a href="index.html" class="block p-3 rounded bg-blue-600 shadow transition-colors"><i class="fas fa-list-ul mr-2"></i> Transações</a>
        <a href="investimentos.html" class="block p-3 rounded hover:bg-slate-700 transition-colors"><i class="fas fa-chart-line mr-2"></i> Investimentos</a>
        <a href="categorias.html" class="block p-3 rounded hover:bg-slate-700 transition-colors"><i class="fas fa-tags mr-2"></i> Categorias</a>
    </nav>
</aside>

<main class="flex-1 flex flex-col h-full overflow-hidden relative">

    <div id="header-mobile" class="lg:hidden fixed top-0 left-0 right-0 bg-slate-800 text-white p-4 flex items-center shadow-md h-16">
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-700 rounded-lg transition-colors mr-3 w-10 h-10 flex items-center justify-center">
            <i id="menu-icon" class="fas fa-bars text-xl"></i>
        </button>
        <div class="flex items-center gap-2 font-black uppercase text-xs tracking-widest text-blue-400">
            Transações
        </div>
    </div>

    <div class="flex-1 overflow-y-auto custom-scroll w-full pt-20 lg:pt-6">

        <header class="px-4 lg:px-6 mb-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6 shrink-0">
            <div class="bg-white p-5 rounded-xl shadow-sm border-l-[16px] border-[#22c55e] transition-transform hover:scale-[1.02]">
                <p class="text-[10px] text-gray-400 font-black uppercase tracking-tight mb-1">Entradas</p>
                <h2 id="total-entrada" class="text-2xl font-black text-green-600 tracking-tighter">R$ 0,00</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-l-[16px] border-[#ef4444] transition-transform hover:scale-[1.02]">
                <p class="text-[10px] text-gray-400 font-black uppercase tracking-tight mb-1">Saídas</p>
                <h2 id="total-saida" class="text-2xl font-black text-red-600 tracking-tighter">R$ 0,00</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-l-[16px] border-[#3b82f6] transition-transform hover:scale-[1.02]">
                <p class="text-[10px] text-gray-400 font-black uppercase tracking-tight mb-1">Investimento</p>
                <h2 id="total-investimento" class="text-2xl font-black text-blue-600 tracking-tighter">R$ 0,00</h2>
            </div>
        </header>

        <section class="px-4 lg:px-6 pb-4 shrink-0">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col xl:flex-row gap-4 xl:items-end">

                <div class="flex flex-col w-full xl:w-48 shrink-0">
                    <label class="text-[9px] font-black text-gray-400 uppercase mb-1 ml-1 tracking-widest">Buscar por:</label>
                    <select id="filtro-tipo" class="input-padrao p-2.5 text-xs font-bold text-slate-700" onchange="ajustarCamposFiltro()">
                        <option value="todos" selected>Por Período</option>
                        <option value="conta">Por Conta</option>
                        <option value="periodo-conta">Período + Conta</option>
                        <option value="categoria">Por Categoria</option>
                        <option value="fatura">Fatura do Cartão</option>
                    </select>
                </div>

                <div id="campos-dinamicos" class="flex flex-wrap gap-3 flex-1 items-end">
                    <div id="div-inicio" class="flex flex-col flex-1 min-w-[130px]"><label class="text-[9px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Início</label><input type="date" id="filtro-inicio" class="input-padrao p-2 text-xs font-bold text-slate-700 h-[38px]"></div>
                    <div id="div-fim" class="flex flex-col flex-1 min-w-[130px]"><label class="text-[9px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Fim</label><input type="date" id="filtro-fim" class="input-padrao p-2 text-xs font-bold text-slate-700 h-[38px]"></div>
                    <div id="div-conta" class="hidden flex flex-col flex-1 min-w-[130px]"><label class="text-[9px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Conta</label><select id="filtro-conta" class="input-padrao p-2 text-xs font-bold text-slate-700 h-[38px]"></select></div>
                    <div id="div-categoria" class="hidden flex flex-col flex-1 min-w-[130px]"><label class="text-[9px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Categoria</label><select id="filtro-categoria" class="input-padrao p-2 text-xs font-bold text-slate-700 h-[38px]"></select></div>
                    <div id="div-fatura" class="hidden flex flex-col flex-1 min-w-[130px]"><label class="text-[9px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Mês Fatura</label><input type="text" id="filtro-mes-fatura" class="input-padrao p-2 text-xs font-bold text-slate-700 h-[38px]" placeholder="Marco/26"></div>
                </div>

                <div class="flex gap-2 w-full xl:w-auto mt-2 xl:mt-0 shrink-0">
                    <button onclick="buscarDados()" class="flex-1 xl:flex-none bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-lg text-xs font-black tracking-widest uppercase shadow-md transition-all h-[38px]">
                        <i class="fas fa-filter mr-1"></i> Filtrar
                    </button>
                    <button onclick="abrirModalNovoGasto()" class="flex-1 xl:flex-none bg-green-600 text-white px-6 py-2 rounded-lg text-xs font-black tracking-widest shadow-md hover:bg-green-700 transition-all uppercase h-[38px]">
                        <i class="fas fa-plus mr-1"></i> Novo
                    </button>
                </div>
            </div>
        </section>

        <div id="status-container" class="hidden px-4 lg:px-6 pb-4">
            <div id="status-message"></div>
        </div>

        <section class="px-4 lg:px-6 pb-24">
            <div id="tabela-container" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto custom-scroll relative transition-all">
                <table class="w-full text-left border-collapse min-w-[950px]">
                    <thead class="bg-slate-50 border-b border-gray-200">
                    <tr>
                        <th class="p-4 w-10"></th>
                        <th class="p-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Data</th>
                        <th class="p-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Valor</th>
                        <th class="p-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Descrição</th>
                        <th class="p-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Conta</th>
                        <th class="p-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Categoria</th>
                        <th class="p-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Fatura</th>
                        <th class="p-4 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Parcela</th>
                    </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>

    </div>
</main>

<div id="modal-novo" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center modal-z p-2 md:p-4 transition-opacity lg:ml-64" onclick="if(event.target === this) fecharModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] flex flex-col overflow-hidden animate-fade-in" onclick="event.stopPropagation()">
        <div class="bg-slate-800 p-5 text-white flex justify-between items-center shrink-0">
            <div>
                <p class="text-[9px] font-black uppercase text-blue-400 tracking-widest">Gerenciador</p>
                <h3 class="font-black uppercase text-base lg:text-lg mt-1"><i class="fas fa-plus-circle mr-2"></i>Novo Registro</h3>
            </div>
            <button onclick="fecharModal()" class="text-gray-400 hover:text-white p-2 transition-colors"><i class="fas fa-times text-2xl"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scroll p-6 bg-white">
            <form id="form-novo" class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div><label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Data (Vazio=Hoje)</label><input type="date" id="new-data" class="w-full input-padrao p-3 text-sm font-bold text-slate-700"></div>
                <div><label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Valor (R$)</label><input type="number" step="0.01" id="new-valor" class="w-full input-padrao p-3 text-sm font-bold text-blue-700 bg-blue-50 border-blue-200" placeholder="0.00" required></div>
                <div><label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Local</label><input type="text" id="new-local" class="w-full input-padrao p-3 text-sm font-bold text-slate-700" placeholder="Ex: Mercado Livre"></div>

                <div class="md:col-span-2"><label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Descrição</label><input type="text" id="new-descricao" class="w-full input-padrao p-3 text-sm font-bold text-slate-700" placeholder="Ex: Compra do mês" required></div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Tipo</label>
                    <select id="new-tipo" onchange="verificarInvestimento()" class="w-full input-padrao p-3 text-sm font-bold text-slate-700">
                        <option value="SAIDA">SAÍDA</option>
                        <option value="ENTRADA">ENTRADA</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Forma Pagto</label>
                    <select id="new-forma" onchange="verificarInvestimento()" class="w-full input-padrao p-3 text-sm font-bold text-slate-700">
                        <option value="DEBITO">DÉBITO</option>
                        <option value="CREDITO">CRÉDITO</option>
                        <option value="INVESTIMENTO">INVESTIMENTO</option>
                    </select>
                </div>

                <div><label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Categoria</label><select id="new-categoria" class="w-full input-padrao p-3 text-sm font-bold text-slate-700"></select></div>

                <div><label id="label-conta-principal" class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Conta</label><select id="new-conta" class="w-full input-padrao p-3 text-sm font-bold text-slate-700"></select></div>

                <div id="div-new-conta-auxiliar" class="hidden flex-col md:col-span-3 bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <div class="flex justify-between items-center mb-2">
                        <label id="label-conta-auxiliar" class="block text-[10px] font-black uppercase tracking-widest text-blue-600">
                            <i class="fas fa-exchange-alt mr-1"></i> Conta Relacionada
                        </label>
                        <label id="label-check-rendimento" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-green-600 cursor-pointer bg-white px-3 py-1.5 rounded-lg border border-green-200 hover:bg-green-50 transition-colors shadow-sm">
                            <input type="checkbox" id="check-rendimento" class="w-4 h-4 rounded text-green-600 focus:ring-green-500" onchange="document.getElementById('new-conta-auxiliar').disabled = this.checked; document.getElementById('new-conta-auxiliar').classList.toggle('opacity-50')">
                            SÓ RENDIMENTO?
                        </label>
                    </div>
                    <select id="new-conta-auxiliar" class="w-full input-padrao border-blue-300 p-3 text-sm font-bold text-slate-700 transition-opacity"></select>
                </div>

                <div><label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Mês Fatura</label><select id="new-mes-fatura" class="w-full input-padrao p-3 text-sm font-bold text-slate-700 disabled:opacity-50 transition-opacity"></select></div>
                <div><label class="block text-[10px] font-black uppercase text-gray-400 mb-1 ml-1 tracking-widest">Parcela</label><input type="text" id="new-parcela" class="w-full input-padrao p-3 text-sm font-bold text-slate-700 disabled:opacity-50 transition-opacity" placeholder="1/1"></div>
            </form>
        </div>

        <div class="p-6 bg-slate-50 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4 shrink-0 rounded-b-2xl">
            <label class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-500 cursor-pointer hover:text-slate-800 transition-colors">
                <input type="checkbox" id="criar-varios" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                MANTER ABERTO (CRIAR VÁRIOS)
            </label>
            <div class="flex gap-3 w-full sm:w-auto">
                <button type="button" onclick="fecharModal()" class="flex-1 sm:flex-none px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-500 hover:text-slate-800 transition-colors">CANCELAR</button>
                <button type="button" onclick="salvarNovoGasto(this)" class="flex-1 sm:flex-none px-8 py-3 bg-green-600 hover:bg-green-700 text-white text-xs font-black uppercase tracking-widest rounded-lg shadow-lg transition-all transform hover:scale-105">Salvar Registro</button>
            </div>
        </div>
    </div>
</div>

<div style="z-index: 9999 !important;" class="fixed top-3 right-4 lg:top-auto lg:bottom-6 lg:right-6 flex flex-col items-end pointer-events-none">
    <div id="status-conexao-flutuante" class="pointer-events-auto cursor-pointer flex items-center justify-center lg:justify-start gap-0 lg:gap-3 text-xs lg:text-sm font-black uppercase tracking-widest w-10 h-10 lg:w-auto lg:h-auto lg:px-4 lg:py-3 rounded-full border shadow-2xl transition-all duration-500 transform bg-white opacity-0 scale-75">
        <i id="status-icon" class="fas fa-sync fa-spin text-lg text-blue-500"></i>
        <span id="status-text" class="hidden lg:inline-block">Conectando...</span>
    </div>
</div>

<div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 flex flex-col gap-2 z- pointer-events-none"></div>
<script>

    const API_URL = "https://script.google.com/macros/s/AKfycby7cBP4XB5-ldRA9P07qLd0onh6GIx79FP_xfK2KHE5GnYogm1xgP-Ft9iy-6z3DkJE_A/exec";

    let listaCategorias = [];
    let listaContas = [];
    let timerLoading = null;
    let statusTimeout1, statusTimeout2;

    // ==========================================
    // 1. INICIALIZAÇÃO E CARREGAMENTO
    // ==========================================

    window.addEventListener('load', async () => {
        const hoje = new Date();
        const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T');
        const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).toISOString().split('T');

        document.getElementById('filtro-inicio').value = primeiroDia;
        document.getElementById('filtro-fim').value = ultimoDia;

        gerarDropdownFatura('new-mes-fatura');
        ajustarCamposFiltro();
        verificarInvestimento();

        atualizarStatus('conectando'); // Status flutuante
        mostrarStatus('loading');      // Loading da Tabela

        await carregarOpcoesAuxiliares();
        await buscarDados();
    });

    async function carregarOpcoesAuxiliares() {
        try {
            const [resCat, resCon] = await Promise.all([
                fetch(`${API_URL}?tipo=categorias`),
                fetch(`${API_URL}?tipo=contas`)
            ]);
            listaCategorias = await resCat.json();
            listaContas = await resCon.json();

            const preencher = (id, lista, key) => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = lista.map(i => `<option value="${i[key]}">${i[key]}</option>`).join('');
            };
            preencher('filtro-conta', listaContas, 'conta');
            preencher('filtro-categoria', listaCategorias, 'categoria');
            preencher('new-conta', listaContas, 'conta');
            preencher('new-conta-auxiliar', listaContas, 'conta');
            preencher('new-categoria', listaCategorias, 'categoria');
        } catch (e) {
            console.error("Erro auxiliares:", e);
            notify('erro', 'Falha ao carregar Contas e Categorias.');
        }
    }

    // ==========================================
    // 2. SISTEMA DE LAYOUT, SIDEBAR E STATUS
    // ==========================================

    function toggleSidebar() {
        const s = document.getElementById('sidebar-lateral');
        const o = document.getElementById('sidebar-overlay');
        const icon = document.getElementById('menu-icon');
        if (s.classList.contains('-translate-x-full')) {
            s.classList.remove('-translate-x-full'); o.classList.remove('hidden'); icon.classList.replace('fa-bars', 'fa-times');
        } else {
            s.classList.add('-translate-x-full'); o.classList.add('hidden'); icon.classList.replace('fa-times', 'fa-bars');
        }
    }

    function atualizarStatus(tipo) {
        const el = document.getElementById('status-conexao-flutuante');
        const span = document.getElementById('status-text');
        const icon = document.getElementById('status-icon');

        clearTimeout(statusTimeout1); clearTimeout(statusTimeout2);

        el.classList.remove('opacity-0', 'scale-75');
        el.classList.add('opacity-100', 'scale-100', 'lg:px-4', 'lg:gap-3');
        el.classList.remove('lg:px-0', 'lg:w-10', 'lg:h-10', 'lg:justify-center');
        span.className = "hidden lg:inline-block";

        const baseClass = "pointer-events-auto cursor-pointer flex items-center justify-center lg:justify-start gap-0 lg:gap-3 text-xs lg:text-sm font-black uppercase tracking-widest w-10 h-10 lg:w-auto lg:h-auto rounded-full border shadow-2xl transition-all duration-500 transform opacity-100 scale-100 ";

        if (tipo === 'conectando') {
            el.className = baseClass + "text-yellow-600 bg-yellow-50 border-yellow-200 lg:px-4";
            span.innerText = "Conectando..."; icon.className = "fas fa-sync fa-spin text-lg";
        } else if (tipo === 'sucesso') {
            el.className = baseClass + "text-green-600 bg-green-50 border-green-200 lg:px-4";
            span.innerText = "Banco Conectado"; icon.className = "fas fa-check-circle text-lg";
            statusTimeout1 = setTimeout(() => {
                span.classList.replace('lg:inline-block', 'hidden'); el.classList.remove('lg:px-4', 'lg:gap-3'); el.classList.add('lg:px-0', 'lg:w-10', 'lg:h-10', 'lg:justify-center');
                statusTimeout2 = setTimeout(() => { el.classList.remove('opacity-100', 'scale-100'); el.classList.add('opacity-0', 'scale-75'); }, 1500);
            }, 3000);
        } else {
            el.className = baseClass + "text-red-600 bg-red-50 border-red-200 lg:px-4";
            span.innerText = "Erro Banco"; icon.className = "fas fa-exclamation-triangle text-lg";
        }
    }

    function notify(tipo, msg) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `${tipo === 'sucesso' ? 'bg-green-600' : 'bg-red-600'} text-white px-8 py-3 rounded-xl shadow-2xl font-black text-[10px] uppercase tracking-widest animate-bounce mt-2 flex items-center gap-2 pointer-events-auto`;
        t.innerHTML = tipo === 'sucesso' ? `<i class="fas fa-check-circle"></i> ${msg}` : `<i class="fas fa-exclamation-triangle"></i> ${msg}`;
        c.appendChild(t);
        setTimeout(() => { t.classList.add('opacity-0', 'transition-opacity'); setTimeout(() => t.remove(), 300); }, 3000);
    }

    // ==========================================
    // 3. LÓGICA DE INTERAÇÃO UI E CONTROLES VISUAIS
    // ==========================================

    function verificarInvestimento() {
        const forma = document.getElementById('new-forma').value;
        const tipo = document.getElementById('new-tipo').value;
        const divAuxiliar = document.getElementById('div-new-conta-auxiliar');
        const labelAuxiliar = document.getElementById('label-conta-auxiliar');
        const labelPrincipal = document.getElementById('label-conta-principal');
        const chkRendimentoLabel = document.getElementById('label-check-rendimento');
        const chkRendimentoInput = document.getElementById('check-rendimento');
        const contaAuxiliarInput = document.getElementById('new-conta-auxiliar');
        const campoFatura = document.getElementById('new-mes-fatura');
        const campoParcela = document.getElementById('new-parcela');

        if (forma === 'INVESTIMENTO') {
            divAuxiliar.classList.remove('hidden'); divAuxiliar.classList.add('flex');
            if (tipo === 'ENTRADA') {
                labelPrincipal.innerText = "Conta Corretora (Destino)";
                labelAuxiliar.innerHTML = '<i class="fas fa-arrow-circle-up text-red-500 mr-1"></i> Conta Banco (Vai sair daqui)';
                chkRendimentoLabel.classList.remove('hidden'); chkRendimentoLabel.classList.add('flex');
            } else {
                labelPrincipal.innerText = "Conta Corretora (Origem)";
                labelAuxiliar.innerHTML = '<i class="fas fa-arrow-circle-down text-green-500 mr-1"></i> Conta Banco (Vai entrar aqui)';
                chkRendimentoLabel.classList.add('hidden'); chkRendimentoLabel.classList.remove('flex');
                chkRendimentoInput.checked = false; contaAuxiliarInput.disabled = false; contaAuxiliarInput.classList.remove('opacity-50');
            }
        } else {
            divAuxiliar.classList.add('hidden'); divAuxiliar.classList.remove('flex');
            labelPrincipal.innerText = "Conta";
            if (chkRendimentoLabel) {
                chkRendimentoLabel.classList.add('hidden'); chkRendimentoLabel.classList.remove('flex');
                chkRendimentoInput.checked = false; contaAuxiliarInput.disabled = false; contaAuxiliarInput.classList.remove('opacity-50');
            }
        }

        if (forma !== 'CREDITO') {
            campoFatura.value = ""; campoFatura.disabled = true; campoFatura.classList.add('bg-gray-100', 'cursor-not-allowed');
            campoParcela.value = ""; campoParcela.disabled = true; campoParcela.classList.add('bg-gray-100', 'cursor-not-allowed');
        } else {
            campoFatura.disabled = false; campoFatura.classList.remove('bg-gray-100', 'cursor-not-allowed');
            if (!campoFatura.value) gerarDropdownFatura('new-mes-fatura');
            campoParcela.disabled = false; campoParcela.classList.remove('bg-gray-100', 'cursor-not-allowed');
            if (!campoParcela.value) campoParcela.value = "1/1";
        }
    }

    function ajustarCamposFiltro() {
        const tipo = document.getElementById('filtro-tipo').value;
        ['div-inicio', 'div-fim', 'div-conta', 'div-categoria', 'div-fatura'].forEach(id => document.getElementById(id).classList.add('hidden'));

        if (['todos', 'periodo-conta'].includes(tipo)) {
            document.getElementById('div-inicio').classList.remove('hidden'); document.getElementById('div-fim').classList.remove('hidden');
        }

        if (['conta', 'periodo-conta', 'fatura'].includes(tipo)) document.getElementById('div-conta').classList.remove('hidden');
        if (tipo === 'categoria') document.getElementById('div-categoria').classList.remove('hidden');
        if (tipo === 'fatura') document.getElementById('div-fatura').classList.remove('hidden');
    }

    // ==========================================
    // 4. BUSCA E RENDERIZAÇÃO DA TABELA
    // ==========================================

    async function buscarDados() {
        atualizarStatus('conectando');
        mostrarStatus('loading');

        const tipo = document.getElementById('filtro-tipo').value;
        const ini = document.getElementById('filtro-inicio').value;
        const fim = document.getElementById('filtro-fim').value;
        const conta = encodeURIComponent(document.getElementById('filtro-conta').value);
        const categoria = encodeURIComponent(document.getElementById('filtro-categoria').value);
        const fatura = encodeURIComponent(document.getElementById('filtro-mes-fatura').value);

        let tipoApi = (tipo === 'todos' && ini && fim) ? 'periodo' : tipo;
        let url = `${API_URL}?tipo=${tipoApi}`;

        if (tipoApi === 'periodo' || tipo === 'periodo-conta') url += `&inicio=${ini}&fim=${fim}`;
        if (tipo === 'conta' || tipo === 'periodo-conta') url += `&conta=${conta}`;
        if (tipo === 'categoria') url += `&categoria=${categoria}`;
        if (tipo === 'fatura') url += `&conta=${conta}&mes_fatura=${fatura}`;

        try {
            const res = await fetch(url);
            const dados = await res.json();

            atualizarStatus('sucesso');

            if (!dados || dados.length === 0) {
                document.getElementById('tabela-corpo').innerHTML = "";
                mostrarStatus('vazio');
            } else {
                renderizarTabela(dados);
                calcularResumos(dados);
                mostrarStatus('sucesso');
            }
        } catch (e) {
            atualizarStatus('erro');
            mostrarStatus('vazio');
            notify('erro', 'Erro ao buscar dados da planilha.');
        }
    }

    function renderizarTabela(dados) {
        const corpo = document.getElementById('tabela-corpo');
        corpo.innerHTML = "";

        dados.forEach((item, index) => {
            const idLinha = `detalhe-${index}`;

            let corVal = "text-green-600";
            if (item.tipo === "SAIDA") { corVal = "text-red-600"; }
            else {
                if (item.forma_pagamento === "INVESTIMENTO") {
                    if (item.descricao && item.descricao.includes("(Rendimento)")) { corVal = "text-green-600"; }
                    else { corVal = "text-blue-600"; }
                } else { corVal = "text-green-600"; }
            }

            let d = String(item.data).split(' ');
            if (d.includes('/')) {
                const p = d.split('/');
                d = `${p.padStart(2,'0')}/${p.padStart(2,'0')}/${p.substring(0,2)}`;
            } else if (d.includes('-')) {
                const p = d.split('-');
                d = `${p}/${p}/${p.substring(2)}`;
            } else { d = d; }

            corpo.innerHTML += `
                <tr class="hover:bg-blue-50/50 cursor-pointer border-t border-gray-100 transition-colors group" onclick="toggleLinha('${idLinha}')">
                    <td class="p-4 text-center text-gray-300 group-hover:text-blue-500"><i class="fas fa-chevron-right transition-all" id="icon-${idLinha}"></i></td>
                    <td class="p-4 text-xs font-bold text-slate-600">${d}</td>
                    <td class="p-4 text-sm font-black ${corVal}">R$ ${item.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    <td class="p-4 text-xs font-bold text-slate-700 truncate max-w-[200px]" title="${item.descricao}">${item.descricao}</td>
                    <td class="p-4 text-[10px] font-black uppercase text-slate-500 tracking-widest">${item.conta}</td>
                    <td class="p-4 text-[9px] font-black text-slate-400 bg-slate-100 uppercase tracking-widest rounded px-2 w-max inline-block mt-3">${item.categoria}</td>
                    <td class="p-4 text-[10px] text-blue-500 font-black uppercase tracking-widest">${item.mes_fatura || "-"}</td>
                    <td class="p-4 text-[10px] text-center text-slate-400 font-black uppercase tracking-widest">${item.parcela || "-"}</td>
                </tr>
                <tr id="${idLinha}" class="hidden bg-slate-50 border-l-[6px] border-blue-500 shadow-inner">
                    <td colspan="8" class="p-6 lg:p-8">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-5" id="form-${idLinha}">
                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Data</label><input type="date" value="${formatarParaInputData(item.data)}" class="w-full input-padrao p-2.5 text-xs font-bold text-slate-700 edit-field" data-key="data"></div>
                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Valor</label><input type="number" step="0.01" value="${item.valor}" class="w-full input-padrao p-2.5 text-xs font-bold text-slate-700 edit-field" data-key="valor"></div>
                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Local</label><input type="text" value="${item.local || ''}" class="w-full input-padrao p-2.5 text-xs font-bold text-slate-700 edit-field" data-key="local"></div>
                            <div class="md:col-span-1"><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Descrição</label><input type="text" value="${item.descricao}" class="w-full input-padrao p-2.5 text-xs font-bold text-slate-700 edit-field" data-key="descricao"></div>

                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Tipo</label><select class="w-full input-padrao p-2.5 text-xs font-bold text-slate-500 bg-gray-100 cursor-not-allowed edit-field" data-key="tipo" disabled><option value="${item.tipo}">${item.tipo}</option></select></div>
                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Forma</label><select class="w-full input-padrao p-2.5 text-xs font-bold text-slate-500 bg-gray-100 cursor-not-allowed edit-field" data-key="forma_pagamento" disabled><option value="${item.forma_pagamento}">${item.forma_pagamento}</option></select></div>

                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Categoria</label><select class="w-full input-padrao p-2.5 text-xs font-bold text-slate-700 edit-field" data-key="categoria">${listaCategorias.map(c => `<option value="${c.categoria}" ${c.categoria === item.categoria ? 'selected' : ''}>${c.categoria}</option>`).join('')}</select></div>
                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Conta</label><select class="w-full input-padrao p-2.5 text-xs font-bold text-slate-700 edit-field" data-key="conta">${listaContas.map(c => `<option value="${c.conta}" ${c.conta === item.conta ? 'selected' : ''}>${c.conta}</option>`).join('')}</select></div>

                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Fatura</label><input type="text" value="${item.mes_fatura || ''}" class="w-full input-padrao p-2.5 text-xs font-bold text-slate-500 bg-gray-100 cursor-not-allowed edit-field" data-key="mes_fatura" disabled></div>
                            <div><label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-1 block">Parcela</label><input type="text" value="${item.parcela || ''}" class="w-full input-padrao p-2.5 text-xs font-bold text-slate-500 bg-gray-100 cursor-not-allowed edit-field" data-key="parcela" disabled></div>

                            <div class="md:col-span-4 flex justify-end items-end gap-3 pt-4 border-t border-gray-200 mt-2">
                                <button onclick="salvarEdicao('${item.id}', '${idLinha}', this)" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-xs font-black uppercase tracking-widest shadow-md hover:bg-blue-700 transition-colors">Salvar Edição</button>
                                <button onclick="deletarGasto('${item.id}', this)" class="bg-red-50 text-red-600 px-6 py-2.5 rounded-lg text-xs font-black uppercase tracking-widest border border-red-200 hover:bg-red-100 transition-colors">Excluir</button>
                            </div>
                        </div>
                    </td>
                </tr>`;
        });
    }

    // ==========================================
    // 5. OPERAÇÕES DE REDE (POST E CRIAÇÃO DUPLA)
    // ==========================================

    async function enviarPost(url, payload) {
        const res = await fetch(url, { method: 'POST', redirect: 'follow', body: JSON.stringify(payload) });
        return await res.json();
    }

    async function salvarNovoGasto(btn) {
        const labelOriginal = btn.innerText;
        btn.innerText = "PROCESSANDO..."; btn.disabled = true;

        const tipoGasto = document.getElementById('new-tipo').value;
        const formaGasto = document.getElementById('new-forma').value;
        const isRendimento = document.getElementById('check-rendimento').checked;

        const payload = {
            data: document.getElementById('new-data').value || new Date().toISOString().split('T'),
            valor: parseFloat(document.getElementById('new-valor').value),
            local: document.getElementById('new-local').value,
            descricao: document.getElementById('new-descricao').value,
            categoria: document.getElementById('new-categoria').value,
            conta: document.getElementById('new-conta').value,
            tipo: tipoGasto,
            forma_pagamento: formaGasto,
            parcela: document.getElementById('new-parcela').value || "1/1",
            mes_fatura: document.getElementById('new-mes-fatura').value
        };

        try {
            if (formaGasto === 'INVESTIMENTO' && !isRendimento) {
                const payloadAuxiliar = { ...payload };
                const contaAux = document.getElementById('new-conta-auxiliar').value;

                if (tipoGasto === 'ENTRADA') {
                    payloadAuxiliar.tipo = 'SAIDA'; payloadAuxiliar.conta = contaAux;
                    payloadAuxiliar.descricao = payload.descricao + ' (Envio para Corretora)'; payloadAuxiliar.forma_pagamento = 'DEBITO';
                } else if (tipoGasto === 'SAIDA') {
                    payloadAuxiliar.tipo = 'ENTRADA'; payloadAuxiliar.conta = contaAux;
                    payloadAuxiliar.descricao = payload.descricao + ' (Resgate da Corretora)'; payloadAuxiliar.forma_pagamento = 'DEBITO';
                }

                const resAux = await enviarPost(`${API_URL}?tipo=criar_gasto`, payloadAuxiliar);
                if (resAux.status === "erro") {
                    notify('erro', 'Erro ao processar a conta relacionada do investimento.');
                    btn.innerText = labelOriginal; btn.disabled = false; return;
                }
            }

            if (isRendimento) {
                payload.forma_pagamento = 'INVESTIMENTO';
                payload.descricao = payload.descricao + ' (Rendimento)';
            }

            const res = await enviarPost(`${API_URL}?tipo=criar_gasto`, payload);
            if (res.status === "erro") { notify('erro', res.mensagem); }
            else {
                notify('sucesso', 'Lançamento registrado com sucesso!');
                if (!document.getElementById('criar-varios').checked) fecharModal();
                buscarDados();
            }
        } catch (e) {
            notify('erro', 'Erro de conexão com a planilha.');
        } finally {
            btn.innerText = labelOriginal; btn.disabled = false;
        }
    }

    async function salvarEdicao(id, idLinha, btn) {
        const labelOriginal = btn.innerText;
        btn.innerText = "SALVANDO..."; btn.disabled = true;

        const inputs = document.querySelectorAll(`#form-${idLinha} .edit-field`);
        const payload = { id: id };

        inputs.forEach(i => {
            if(!i.disabled) { payload[i.getAttribute('data-key')] = i.value; }
            else { payload[i.getAttribute('data-key')] = i.value || ""; }
        });

        try {
            const res = await enviarPost(`${API_URL}?tipo=editar_gasto`, payload);
            if (res.status === "erro") { notify('erro', res.mensagem); }
            else { notify('sucesso', 'Edição salva com sucesso!'); buscarDados(); }
        } catch (e) { notify('erro', 'Erro ao editar lançamento.');
        } finally { btn.innerText = labelOriginal; btn.disabled = false; }
    }

    async function deletarGasto(id, btn) {
        if (!confirm("Tem certeza que deseja excluir este registro?")) return;

        const labelOriginal = btn.innerText;
        btn.innerText = "LIMPANDO..."; btn.disabled = true;

        try {
            await enviarPost(`${API_URL}?tipo=deletar_gasto`, { id: id });
            notify('sucesso', 'Registro excluído!'); buscarDados();
        } catch (e) {
            notify('erro', 'Erro ao excluir.');
            btn.innerText = labelOriginal; btn.disabled = false;
        }
    }

    // ==========================================
    // 6. UTILITÁRIOS E FORMATAÇÃO
    // ==========================================

    function formatarParaInputData(str) {
        if (!str) return "";
        if (str.includes('T')) return str.split('T');
        if (!str.includes('/')) return str;
        const [d, m, a] = str.split('/');
        const ano = a.length === 2 ? `20${a}` : a.substring(0,4);
        return `${ano}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
    }

    function gerarDropdownFatura(id, valorAtual = "") {
        const meses = ["Janeiro", "Fevereiro", "Marco", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const agora = new Date();
        const fAtual = `${meses[agora.getMonth()]}/${String(agora.getFullYear()).slice(-2)}`;
        let h = "";

        for (let ano = 26; ano <= 30; ano++) {
            meses.forEach(m => {
                const val = `${m}/${ano}`;
                h += `<option value="${val}" ${valorAtual ? val === valorAtual : val === fAtual ? 'selected' : ''}>${val}</option>`;
            });
        }
        if (id) document.getElementById(id).innerHTML = h;
        return h;
    }

    function mostrarStatus(tipo) {
        const container = document.getElementById('status-container');
        const msgArea = document.getElementById('status-message');
        const tab = document.getElementById('tabela-container');

        // Remove qualquer contador que tenha ficado preso
        if (timerLoading) { clearInterval(timerLoading); timerLoading = null; }

        if (tipo === 'loading') {
            container.classList.remove('hidden');
            tab.classList.add('loading-overlay');
            msgArea.className = "p-4 bg-white text-blue-600 rounded-xl text-center text-xs font-black uppercase tracking-widest border border-blue-100 shadow-sm";
            // APENAS A LINHA COM O SÍMBOLO, SEM MENSAGEM DE SEGUNDOS
            msgArea.innerHTML = `<i class='fas fa-circle-notch fa-spin mr-2 text-lg'></i> Buscando dados...`;

        } else if (tipo === 'vazio') {
            container.classList.remove('hidden');
            tab.classList.remove('loading-overlay');
            msgArea.innerHTML = "<i class='fas fa-folder-open mr-2 text-lg'></i> Nenhum registro encontrado neste período.";
            msgArea.className = "p-4 bg-amber-50 text-amber-700 rounded-xl text-center text-xs font-black uppercase tracking-widest border border-amber-200";
        } else {
            container.classList.add('hidden');
            tab.classList.remove('loading-overlay');
        }
    }

    function calcularResumos(dados) {
        let ent = 0, sai = 0, inv = 0;

        dados.forEach(i => {
            const v = parseFloat(i.valor) || 0;
            if (i.forma_pagamento === "INVESTIMENTO") {
                if (i.tipo === "ENTRADA") inv += v;
                else if (i.tipo === "SAIDA") inv -= v;
            } else {
                if (i.tipo === "ENTRADA") ent += v;
                else if (i.tipo === "SAIDA") sai += v;
            }
        });

        document.getElementById('total-entrada').innerText = `R$ ${ent.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        document.getElementById('total-saida').innerText = `R$ ${sai.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        document.getElementById('total-investimento').innerText = `R$ ${inv.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
    }

    function toggleLinha(id) {
        const el = document.getElementById(id);
        const icon = document.getElementById(`icon-${id}`);
        const isHidden = el.classList.contains('hidden');

        document.querySelectorAll('[id^="detalhe-"]').forEach(d => d.classList.add('hidden'));
        document.querySelectorAll('[id^="icon-detalhe-"]').forEach(i => {
            i.classList.remove('fa-chevron-down'); i.classList.add('fa-chevron-right'); i.parentElement.parentElement.classList.remove('bg-blue-50/50');
        });

        if (isHidden) {
            el.classList.remove('hidden');
            icon.classList.remove('fa-chevron-right'); icon.classList.add('fa-chevron-down');
            icon.parentElement.parentElement.classList.add('bg-blue-50/50');
        }
    }

    function fecharModal() {
        document.getElementById('modal-novo').classList.add('hidden');
        document.getElementById('form-novo').reset();

        const chkRendimento = document.getElementById('check-rendimento');
        const contaAuxiliar = document.getElementById('new-conta-auxiliar');

        if (chkRendimento && contaAuxiliar) {
            chkRendimento.checked = false; contaAuxiliar.disabled = false; contaAuxiliar.classList.remove('opacity-50');
        }
        verificarInvestimento();
    }

    function abrirModalNovoGasto() {
        document.getElementById('modal-novo').classList.remove('hidden');
        document.getElementById('new-data').value = new Date().toISOString().split('T');
    }




</script>
